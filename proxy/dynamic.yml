http:
  routers:
    litellm:
      rule: "Host(`localhost`) && (PathPrefix(`/v1`) || PathPrefix(`/key`) || PathPrefix(`/model`) || PathPrefix(`/health`))"
      service: litellm
      entryPoints: [websecure]
      middlewares: [secure-headers, litellm-rate-limit, request-size, inflight-litellm]
      tls:
        certResolver: letsencrypt
    webui:
      rule: "Host(`localhost`)"
      service: webui
      entryPoints: [websecure]
      middlewares: [secure-headers, webui-rate-limit, request-size, inflight-webui]
      tls:
        certResolver: letsencrypt
  services:
    litellm:
      loadBalancer:
        servers: [{url: "http://litellm:4000"}]
        healthCheck:
          path: /health/readiness
          interval: 15s
          timeout: 5s
    webui:
      loadBalancer:
        servers: [{url: "http://open-webui:8080"}]
        healthCheck:
          path: /health
          interval: 30s
          timeout: 5s
  middlewares:
    secure-headers:
      headers:
        frameDeny: true
        contentTypeNosniff: true
        referrerPolicy: no-referrer
    request-size:
      buffering:
        maxRequestBodyBytes: 20971520
        memRequestBodyBytes: 1048576
    litellm-rate-limit:
      rateLimit:
        average: 60
        burst: 120
    webui-rate-limit:
      rateLimit:
        average: 80
        burst: 160
    inflight-litellm:
      inFlightReq:
        amount: 80
    inflight-webui:
      inFlightReq:
        amount: 120
