api:
  dashboard: false
ping: {}
entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
  websecure:
    address: ":443"
    transport:
      respondingTimeouts:
        readTimeout: 30s
        writeTimeout: 120s
        idleTimeout: 120s
providers:
  file:
    filename: /etc/traefik/dynamic.yml
log:
  level: INFO
  format: json
  filePath: /var/log/traefik/runtime.log
accessLog:
  format: json
  filePath: /var/log/traefik/access.log
certificatesResolvers:
  letsencrypt:
    acme:
      email: admin@localhost
      storage: /acme/acme.json
      httpChallenge:
        entryPoint: web
