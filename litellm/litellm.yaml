model_list:
  - model_name: "*"
    litellm_params:
      model: "ollama_chat/*"
      api_base: ${OLLAMA_API_BASE}

general_settings:
  master_key: ${LITELLM_MASTER_KEY}
  disable_spend_logs: true
  health_check_interval: 300
  infer_model_from_keys: true

router_settings:
  routing_strategy: simple-shuffle
  num_retries: 2
  timeout: 180
