name: ${COMPOSE_PROJECT_NAME:-local-ai-stack}

x-service-env: &service-env
  env_file:
    - .env


x-default-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m" # Prevent unbounded log growth on long-running hosts.
    max-file: "3"

x-default-security: &default-security
  security_opt:
    - no-new-privileges:true # Block privilege escalation inside container.
  cap_drop:
    - ALL # Drop Linux capabilities unless explicitly required.

x-default-dns: &default-dns
  dns:
    - 1.1.1.1 # Primary resilient resolver.
    - 8.8.8.8 # Fallback resolver to survive transient DNS failures.

services:
  postgres:
    image: postgres:16
    container_name: localai-postgres
    restart: unless-stopped
    <<: [*service-env, *default-dns]
    environment:
      POSTGRES_USER: "${POSTGRES_USER:?POSTGRES_USER required}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}"
      POSTGRES_DB: "${POSTGRES_DB:?POSTGRES_DB required}"
      POSTGRES_INITDB_ARGS: "--auth=scram-sha-256"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks: [backend]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U ${POSTGRES_USER:?POSTGRES_USER required} -d ${POSTGRES_DB:?POSTGRES_DB required}"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    mem_limit: 1g
    cpus: 1.0
    ulimits:
      nofile: 65536
    logging: *default-logging

  redis:
    image: redis:7-alpine
    container_name: localai-redis
    restart: unless-stopped
    <<: [*service-env, *default-dns]
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1000"]
    volumes:
      - redis_data:/data
    networks: [backend]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12
    mem_limit: 512m
    cpus: 0.75
    ulimits:
      nofile: 65536
    logging: *default-logging

  litellm-migrate:
    image: litellm/litellm-database:v1.83.14-stable.patch.3
    container_name: localai-litellm-migrate
    restart: "no" # One-shot migration gate to avoid schema drift during app boot.
    <<: [*service-env, *default-dns, *default-security]
    entrypoint: ["/bin/bash", "-lc"]
    command: "python /app/scripts/generate_litellm_config.py && /app/scripts/wait-for-dependencies.sh"
    environment:
      POSTGRES_HOST: "${POSTGRES_HOST:-postgres}"
      POSTGRES_PORT: "${POSTGRES_PORT:-5432}"
      REDIS_HOST: "${REDIS_HOST:-redis}"
      REDIS_PORT: "${REDIS_PORT:-6379}"
      OLLAMA_API_BASE: "${OLLAMA_API_BASE:?OLLAMA_API_BASE required}"
      VLLM_API_BASE: "${VLLM_API_BASE:-}"
      VLLM_API_KEY: "${VLLM_API_KEY:-EMPTY}"
      LITELLM_GENERATED_CONFIG_PATH: /tmp/litellm.generated.yaml
      DATABASE_URL: "${DATABASE_URL:?DATABASE_URL required}"
      REDIS_URL: "${REDIS_URL:?REDIS_URL required}"
      LITELLM_MASTER_KEY: "${LITELLM_MASTER_KEY:?LITELLM_MASTER_KEY required}"
      LITELLM_SALT_KEY: "${LITELLM_SALT_KEY:?LITELLM_SALT_KEY required}"
      LITELLM_CONFIG_PATH: /tmp/litellm.generated.yaml
      ENABLE_DB_MIGRATIONS: "${ENABLE_DB_MIGRATIONS:-true}"
      STORE_MODEL_IN_DB: "${STORE_MODEL_IN_DB:-True}"
      DISABLE_PRISMA_GENERATE: "${DISABLE_PRISMA_GENERATE:-true}"
      LITELLM_DISABLE_AUTO_MIGRATIONS: "false"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./litellm/litellm.yaml:/app/config/litellm.yaml:ro
      - ./scripts/generate_litellm_config.py:/app/scripts/generate_litellm_config.py:ro
      - ./scripts/ollama_network.py:/app/scripts/ollama_network.py:ro
      - ./scripts/wait-for-dependencies.sh:/app/scripts/wait-for-dependencies.sh:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [backend]
    read_only: true
    tmpfs: ["/tmp"]
    mem_limit: 512m
    cpus: 0.5
    logging: *default-logging

  litellm:
    image: litellm/litellm-database:v1.83.14-stable.patch.3
    container_name: localai-litellm
    restart: unless-stopped
    <<: [*service-env, *default-dns, *default-security]
    user: "1000:1000" # Avoid root runtime where image supports it.
    entrypoint: ["/bin/bash", "-lc"]
    command: "python /app/scripts/generate_litellm_config.py && exec litellm --config /tmp/litellm.generated.yaml --port 4000 --host 0.0.0.0"
    environment:
      DATABASE_URL: "${DATABASE_URL:?DATABASE_URL required}"
      REDIS_URL: "${REDIS_URL:?REDIS_URL required}"
      LITELLM_MASTER_KEY: "${LITELLM_MASTER_KEY:?LITELLM_MASTER_KEY required}"
      LITELLM_SALT_KEY: "${LITELLM_SALT_KEY:?LITELLM_SALT_KEY required}"
      OLLAMA_API_BASE: "${OLLAMA_API_BASE:?OLLAMA_API_BASE required}"
      VLLM_API_BASE: "${VLLM_API_BASE:-}"
      VLLM_API_KEY: "${VLLM_API_KEY:-EMPTY}"
      LITELLM_GENERATED_CONFIG_PATH: /tmp/litellm.generated.yaml
      STORE_MODEL_IN_DB: "${STORE_MODEL_IN_DB:-True}"
      DISABLE_PRISMA_GENERATE: "${DISABLE_PRISMA_GENERATE:-true}" # Enforce prebuilt Prisma client artifacts.
      DISABLE_BACKGROUND_BUDGET_RESET: "${DISABLE_BACKGROUND_BUDGET_RESET:-true}"
      LITELLM_DISABLE_AUTO_MIGRATIONS: "${LITELLM_DISABLE_AUTO_MIGRATIONS:-true}" # Prevent app startup from mutating schema.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./litellm/litellm.yaml:/app/config/litellm.yaml:ro
      - ./scripts/generate_litellm_config.py:/app/scripts/generate_litellm_config.py:ro
      - ./scripts/ollama_network.py:/app/scripts/ollama_network.py:ro
      - ./scripts/litellm_start.sh:/app/scripts/litellm_start.sh:ro
      - ./scripts/litellm_healthcheck.sh:/app/scripts/litellm_healthcheck.sh:ro
      - litellm_logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      litellm-migrate:
        condition: service_completed_successfully
    ports:
      - "4000:4000"
    networks: [backend]
    read_only: false
    tmpfs: ["/tmp"]
    healthcheck:
      test: ["CMD", "/bin/bash", "/app/scripts/litellm_healthcheck.sh"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s
    mem_limit: 2g
    cpus: 2.0
    ulimits:
      nofile: 65536
    logging: *default-logging

  vllm:
    image: vllm/vllm-openai:latest
    container_name: localai-vllm
    restart: unless-stopped
    profiles: ["with-vllm"]
    <<: *service-env
    environment:
      HUGGING_FACE_HUB_TOKEN: "${HUGGING_FACE_HUB_TOKEN:-}"
      HF_HOME: /root/.cache/huggingface
    command: ["--model", "${VLLM_MODEL:-Qwen/Qwen2.5-Coder-7B-Instruct}", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "127.0.0.1:8001:8000"
    volumes:
      - huggingface_cache:/root/.cache/huggingface
    networks: [backend]
    ipc: host
    gpus: all
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import urllib.request; urllib.request.urlopen(\"http://127.0.0.1:8000/v1/models\", timeout=5).read()' >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 180s
    logging: *default-logging

  open-webui:
    image: ghcr.io/open-webui/open-webui:v0.5.12
    container_name: localai-open-webui
    restart: unless-stopped
    <<: [*service-env, *default-dns]
    security_opt:
      - no-new-privileges:true
    environment:
      OPENAI_API_BASE_URL: http://litellm:4000/v1
      OPENAI_API_KEY: "${LITELLM_MASTER_KEY:?LITELLM_MASTER_KEY required}"
      WEBUI_AUTH: "True"
      ENABLE_OLLAMA_API: "True"
      ENABLE_BASE_MODELS_CACHE: "False"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "3000:8080"
    volumes:
      - open_webui_data:/app/backend/data
    depends_on:
      litellm:
        condition: service_healthy
    networks: [backend, edge]
    read_only: false
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:8080/health >/dev/null && wget -qO- http://host.docker.internal:11434/api/tags >/dev/null && wget --header="Authorization: Bearer $$OPENAI_API_KEY" -qO- http://litellm:4000/v1/models >/dev/null']
      interval: 20s
      timeout: 10s
      retries: 12
    mem_limit: 2g
    cpus: 1.5
    logging: *default-logging

  reverse-proxy:
    image: traefik:v3.1
    container_name: localai-traefik
    restart: unless-stopped
    <<: [*service-env, *default-dns, *default-security]
    command: ["--configFile=/etc/traefik/traefik.yml"]
    ports: ["80:80", "443:443"]
    volumes:
      - ./proxy/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./proxy/dynamic.yml:/etc/traefik/dynamic.yml:ro
    depends_on:
      litellm:
        condition: service_healthy
      open-webui:
        condition: service_healthy
    networks: [backend, edge]
    read_only: true
    tmpfs: ["/tmp"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/ping >/dev/null"]
      interval: 20s
      timeout: 5s
      retries: 12
    mem_limit: 512m
    cpus: 0.5
    logging: *default-logging

networks:
  edge:
    name: local-ai-edge
  backend:
    name: local-ai-backend

volumes:
  postgres_data:
  redis_data:
  litellm_logs:
  open_webui_data:
  huggingface_cache:
