name: local-ai-stack

x-default-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m" # Prevent unbounded log growth on long-running hosts.
    max-file: "3"

x-default-security: &default-security
  security_opt:
    - no-new-privileges:true # Block privilege escalation inside container.
  cap_drop:
    - ALL # Drop Linux capabilities unless explicitly required.

x-default-dns: &default-dns
  dns:
    - 1.1.1.1 # Primary resilient resolver.
    - 8.8.8.8 # Fallback resolver to survive transient DNS failures.

services:
  postgres:
    image: postgres:16
    container_name: localai-postgres
    restart: unless-stopped
    <<: *default-dns
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_INITDB_ARGS: "--auth=scram-sha-256"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks: [backend]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    mem_limit: 1g
    cpus: 1.0
    ulimits:
      nofile: 65536
    logging: *default-logging

  redis:
    image: redis:7-alpine
    container_name: localai-redis
    restart: unless-stopped
    <<: *default-dns
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1000"]
    volumes:
      - redis_data:/data
    networks: [backend]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12
    mem_limit: 512m
    cpus: 0.75
    ulimits:
      nofile: 65536
    logging: *default-logging

  litellm-migrate:
    image: litellm/litellm-database:v1.83.14-stable.patch.3
    container_name: localai-litellm-migrate
    restart: "no" # One-shot migration gate to avoid schema drift during app boot.
    <<: [*default-dns, *default-security]
    entrypoint: ["/bin/bash", "-lc", "/app/scripts/wait-for-dependencies.sh && /app/scripts/generate_litellm_config.py && litellm --config ${LITELLM_GENERATED_CONFIG_PATH:-/tmp/litellm.generated.yaml} --test >/dev/null"]
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      OLLAMA_API_BASE: ${OLLAMA_API_BASE}
      VLLM_API_BASE: ${VLLM_API_BASE:-}
      VLLM_API_BASE: ${VLLM_API_BASE:-}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      LITELLM_SALT_KEY: ${LITELLM_SALT_KEY}
      LITELLM_CONFIG_PATH: /app/config/litellm.yaml
      LITELLM_GENERATED_CONFIG_PATH: /tmp/litellm.generated.yaml
      ENABLE_DB_MIGRATIONS: ${ENABLE_DB_MIGRATIONS:-true}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./litellm/litellm.yaml:/app/config/litellm.yaml:ro
      - ./scripts/wait-for-dependencies.sh:/app/scripts/wait-for-dependencies.sh:ro
      - ./scripts/generate_litellm_config.py:/app/scripts/generate_litellm_config.py:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [backend]
    read_only: true
    tmpfs: ["/tmp"]
    mem_limit: 512m
    cpus: 0.5
    logging: *default-logging

  litellm:
    image: litellm/litellm-database:v1.83.14-stable.patch.3
    container_name: localai-litellm
    restart: unless-stopped
    <<: [*default-dns, *default-security]
    user: "1000:1000" # Avoid root runtime where image supports it.
    command: ["/bin/bash", "-lc", "/app/scripts/generate_litellm_config.py && litellm --config ${LITELLM_GENERATED_CONFIG_PATH:-/tmp/litellm.generated.yaml} --port 4000 --host 0.0.0.0"]
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      LITELLM_SALT_KEY: ${LITELLM_SALT_KEY}
      OLLAMA_API_BASE: ${OLLAMA_API_BASE}
      STORE_MODEL_IN_DB: "True"
      DISABLE_PRISMA_GENERATE: "true" # Enforce prebuilt Prisma client artifacts.
      DISABLE_BACKGROUND_BUDGET_RESET: ${DISABLE_BACKGROUND_BUDGET_RESET:-true}
      LITELLM_GENERATED_CONFIG_PATH: /tmp/litellm.generated.yaml
      LITELLM_DISABLE_AUTO_MIGRATIONS: "true" # Prevent app startup from mutating schema.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./litellm/litellm.yaml:/app/config/litellm.yaml:ro
      - ./scripts/generate_litellm_config.py:/app/scripts/generate_litellm_config.py:ro
      - litellm_logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      litellm-migrate:
        condition: service_completed_successfully
    networks: [backend]
    read_only: true
    tmpfs: ["/tmp"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4000/health/readiness >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 30s
    mem_limit: 2g
    cpus: 2.0
    ulimits:
      nofile: 65536
    logging: *default-logging

  vllm:
    image: vllm/vllm-openai:latest
    container_name: localai-vllm
    restart: unless-stopped
    profiles: ["with-vllm"]
    <<: *default-dns
    command: ["--model", "${VLLM_MODEL}", "--host", "0.0.0.0", "--port", "8000", "--served-model-name", "${VLLM_MODEL}"]
    environment:
      HUGGING_FACE_HUB_TOKEN: ${HUGGING_FACE_HUB_TOKEN:-}
    ports:
      - "127.0.0.1:8001:8000"
    volumes:
      - vllm_cache:/root/.cache/huggingface
    networks: [backend]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8000/v1/models >/dev/null"]
      interval: 20s
      timeout: 10s
      retries: 12
    gpus: all
    mem_limit: 24g
    cpus: 8.0
    logging: *default-logging

  open-webui:
    image: ghcr.io/open-webui/open-webui:v0.5.12
    container_name: localai-open-webui
    restart: unless-stopped
    <<: *default-dns
    security_opt:
      - no-new-privileges:true
    environment:
      OPENAI_API_BASE_URL: http://litellm:4000/v1
      OPENAI_API_KEY: ${LITELLM_MASTER_KEY}
      WEBUI_AUTH: "True"
      ENABLE_OLLAMA_API: "False"
    ports:
      - "3000:8080"
    volumes:
      - open_webui_data:/app/backend/data
    depends_on:
      litellm:
        condition: service_healthy
    networks: [backend, edge]
    read_only: false
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health >/dev/null"]
      interval: 20s
      timeout: 10s
      retries: 12
    mem_limit: 2g
    cpus: 1.5
    logging: *default-logging

  reverse-proxy:
    image: traefik:v3.1
    container_name: localai-traefik
    restart: unless-stopped
    <<: [*default-dns, *default-security]
    command: ["--configFile=/etc/traefik/traefik.yml"]
    ports: ["80:80", "443:443"]
    volumes:
      - ./proxy/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./proxy/dynamic.yml:/etc/traefik/dynamic.yml:ro
    depends_on:
      litellm:
        condition: service_healthy
      open-webui:
        condition: service_healthy
    networks: [backend, edge]
    read_only: true
    tmpfs: ["/tmp"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/ping >/dev/null"]
      interval: 20s
      timeout: 5s
      retries: 12
    mem_limit: 512m
    cpus: 0.5
    logging: *default-logging

networks:
  edge:
    name: local-ai-edge
  backend:
    name: local-ai-backend
    internal: true

volumes:
  postgres_data:
  redis_data:
  litellm_logs:
  open_webui_data:
